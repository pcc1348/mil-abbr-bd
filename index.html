<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mil Abbr Converter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <div class="hero">
        <h1>Mil Abbr Converter</h1>
        <p>Search Bangladesh military abbreviations and meanings instantly. Upload your own CSV file to use a custom list.</p>
      </div>
    </header>

    <section class="controls-panel">
      <div class="control-row">
        <label for="fileInput">Upload a CSV file</label>
        <input id="fileInput" type="file" accept=".csv,text/csv" />
      </div>

      <div class="control-row">
        <label for="searchInput">Search abbreviation or meaning</label>
        <input id="searchInput" type="search" placeholder="Type abbreviation or meaning..." autocomplete="off" />
      </div>

      <div id="statusText" class="status">Loading abbreviations...</div>
    </section>

    <section class="results-panel">
      <div class="summary-row">
        <div id="summaryText">No data loaded yet.</div>
      </div>
      <div class="table-wrap">
        <table aria-label="Abbreviation search results">
          <thead>
            <tr id="resultsHeader"></tr>
          </thead>
          <tbody id="resultsBody">
            <tr><td colspan="2">Please wait while the CSV loads...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
